{% extends "base.html" %}

{% block title %}{{ form.title }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    
    <div class="d-flex align-items-center mb-4">
        <a href="javascript:history.back()" class="btn btn-outline-secondary me-3 shadow-sm rounded-circle" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0 text-gray-800">{{ form.title }}</h4>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-10 col-lg-12">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4 p-md-5">
                    
                    <div id="form-alerts"></div>

                    {{ form.render()|safe }}
                    
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
